<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>First Last</title>
<!-- ============================================================
     EDIT ME: change the <title> above to your name
     ============================================================ -->
<style>
  :root {
    --bg: #f7f5f0;
    --card-bg: #ffffff;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --accent: #2f5233;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: Georgia, "Times New Roman", serif;
    padding: 24px;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid #d8d4c8;
    border-radius: 2px;
    padding: 48px 36px;
    max-width: 360px;
    width: 100%;
    text-align: center;
  }
  .avatar {
    width: 64px;
    height: 64px;
    border-radius: 0;
    background: none;
    border: 1px solid var(--text);
    margin: 0 auto 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 400;
    color: var(--text);
  }
  h1 {
    margin: 0 0 2px;
    font-size: 26px;
    font-weight: 400;
    letter-spacing: 0.5px;
  }
  .role {
    margin: 0 0 28px;
    color: var(--muted);
    font-size: 14px;
    font-style: italic;
  }
  .details { text-align: center; margin-bottom: 28px; }
  .details div {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 10px 0;
    border-bottom: 1px solid #e5e1d6;
    font-size: 14px;
  }
  .details div:last-child { border-bottom: none; }
  .label {
    color: var(--muted);
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 1px;
  }
  a { color: var(--text); text-decoration: none; border-bottom: 1px solid transparent; }
  a:hover { border-bottom-color: var(--muted); }
  .save-btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 2px;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    text-align: center;
  }
  .save-btn:active { opacity: 0.85; }
</style>
</head>
<body>

<div class="card">
  <div class="avatar">KV</div>
  <!-- ^ EDIT ME: swap "FL" for your initials -->

  <h1>Konrad Vanmarle</h1>
  <!-- ^ EDIT ME: your name -->

  <p class="role">Computing Sites Training Manager · Mizzou Division of IT</p>
  <!-- ^ EDIT ME: your title / company -->

  <div class="details">
    <div><span class="label">Phone</span><a href="tel:+15733034723">+1 (573) 303-4723</a></div>
    <div><span class="label">Email</span><a href="mailto:konradvanmarle@gmail.com">konradvanmarle@gmail.com</a></div>
    <!-- ^ EDIT ME: update each phone/email/website line above (both the href and the visible text) -->
  </div>

  <a class="save-btn" href="contact.vcf" download>Save Contact</a>
  <!-- This button is the fallback for anyone who lands here without
       being auto-redirected (desktop browsers, in-app browsers, etc). -->
</div>

<script>
  // ============================================================
  // Platform-aware auto redirect.
  // iOS Safari: navigating straight to a .vcf URL pops the native
  // "Add Contact" screen automatically, so we jump there right away.
  // Android/others: Chrome just downloads the file rather than
  // previewing it, so there's no benefit to auto-redirecting —
  // we leave those visitors on the fallback card with the button above.
  // ============================================================
  const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);

  if (isIOS) {
    window.location.href = "contact.vcf";
  }
</script>

</body>
</html>
