<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>First Last</title>
<!-- ============================================================
     EDIT ME: change the <title> above to your name
     ============================================================ -->
<style>
  :root {
    --bg: #0a0d0a;
    --card-bg: #10140f;
    --text: #d7ffd9;
    --muted: #5c7a5f;
    --accent: #3ddc61;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: "SF Mono", "Courier New", monospace;
    padding: 24px;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 36px 28px;
    max-width: 360px;
    width: 100%;
    text-align: left;
    box-shadow: 0 0 24px rgba(61, 220, 97, 0.15);
  }
  .avatar {
    width: 56px;
    height: 56px;
    border-radius: 4px;
    background: transparent;
    border: 1px solid var(--accent);
    margin: 0 0 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
  }
  h1 {
    margin: 0 0 4px;
    font-size: 20px;
    font-weight: 700;
  }
  h1::before { content: "> "; color: var(--accent); }
  .role {
    margin: 0 0 24px;
    color: var(--muted);
    font-size: 13px;
  }
  .details { text-align: left; margin-bottom: 28px; }
  .details div {
    display: flex;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px dashed rgba(61, 220, 97, 0.2);
    font-size: 13px;
  }
  .details div:last-child { border-bottom: none; }
  .label {
    color: var(--muted);
    min-width: 60px;
    flex-shrink: 0;
  }
  .label::before { content: "$ "; }
  a { color: var(--text); text-decoration: none; }
  a:hover { color: var(--accent); }
  .save-btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 4px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    text-align: center;
    font-family: inherit;
  }
  .save-btn:before { content: "[ "; }
  .save-btn:after { content: " ]"; }
  .save-btn:active { background: rgba(61, 220, 97, 0.1); }
</style>
</head>
<body>

<div class="card">
  <div class="avatar">KV</div>
  <!-- ^ EDIT ME: swap "FL" for your initials -->

  <h1>Konrad Vanmarle</h1>
  <!-- ^ EDIT ME: your name -->

  <p class="role">Computing Sites Training Manager · Mizzou Division of IT</p>
  <!-- ^ EDIT ME: your title / company -->

  <div class="details">
    <div><span class="label">Phone</span><a href="tel:+15733034723">+1 (573) 303-4723</a></div>
    <div><span class="label">Email</span><a href="mailto:konradvanmarle@gmail.com">konradvanmarle@gmail.com</a></div>
    <!-- ^ EDIT ME: update each phone/email/website line above (both the href and the visible text) -->
  </div>

  <a class="save-btn" href="contact.vcf" download>Save Contact</a>
  <!-- This button is the fallback for anyone who lands here without
       being auto-redirected (desktop browsers, in-app browsers, etc). -->
</div>

<script>
  // ============================================================
  // Platform-aware auto redirect.
  // iOS Safari: navigating straight to a .vcf URL pops the native
  // "Add Contact" screen automatically, so we jump there right away.
  // Android/others: Chrome just downloads the file rather than
  // previewing it, so there's no benefit to auto-redirecting —
  // we leave those visitors on the fallback card with the button above.
  // ============================================================
  const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);

  if (isIOS) {
    window.location.href = "contact.vcf";
  }
</script>

</body>
</html>
