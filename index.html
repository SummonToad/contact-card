<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>First Last</title>
<!-- ============================================================
     EDIT ME: change the <title> above to your name
     ============================================================ -->
<style>
  :root {
    --bg: #121212;
    --card-bg: #1c1c1c;
    --text: #f2f2f2;
    --muted: #9a9a9a;
    --accent: #4da3ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 24px;
  }
  .card {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 40px 32px;
    max-width: 360px;
    width: 100%;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: var(--accent);
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: 600;
    color: #fff;
  }
  /* ============================================================
     EDIT ME: replace initials text "FL" further down in the body,
     or swap the avatar div for an <img> tag if you want a photo
     ============================================================ */
  h1 {
    margin: 0 0 4px;
    font-size: 24px;
    font-weight: 700;
  }
  .role {
    margin: 0 0 24px;
    color: var(--muted);
    font-size: 15px;
  }
  .details {
    text-align: left;
    margin-bottom: 28px;
  }
  .details div {
    display: flex;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    font-size: 15px;
  }
  .details div:last-child { border-bottom: none; }
  .label {
    color: var(--muted);
    min-width: 60px;
    flex-shrink: 0;
  }
  a { color: var(--text); text-decoration: none; }
  .save-btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
  }
  .save-btn:active { opacity: 0.85; }
</style>
</head>
<body>

<div class="card">
  <div class="avatar">FL</div>
  <!-- ^ EDIT ME: swap "FL" for your initials -->

  <h1>First Last</h1>
  <!-- ^ EDIT ME: your name -->

  <p class="role">Job Title · Company Name</p>
  <!-- ^ EDIT ME: your title / company -->

  <div class="details">
    <div><span class="label">Phone</span><a href="tel:+15555550123">+1 (555) 555-0123</a></div>
    <div><span class="label">Email</span><a href="mailto:you@example.com">you@example.com</a></div>
    <div><span class="label">Web</span><a href="https://example.com">example.com</a></div>
    <!-- ^ EDIT ME: update each phone/email/website line above (both the href and the visible text) -->
  </div>

  <a class="save-btn" href="contact.vcf" download>Save Contact</a>
  <!-- This button is the fallback for anyone who lands here without
       being auto-redirected (desktop browsers, in-app browsers, etc). -->
</div>

<script>
  // ============================================================
  // Platform-aware auto redirect.
  // iOS Safari: navigating straight to a .vcf URL pops the native
  // "Add Contact" screen automatically, so we jump there right away.
  // Android/others: Chrome just downloads the file rather than
  // previewing it, so there's no benefit to auto-redirecting —
  // we leave those visitors on the fallback card with the button above.
  // ============================================================
  const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);

  if (isIOS) {
    window.location.href = "contact.vcf";
  }
</script>

</body>
</html>
